name: Build Desktop App

# Потрібно для electron-builder --publish always (завантаження в Releases)
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (win, mac, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - win
          - mac
          - all

jobs:
  # Windows має публікувати реліз першим; mac додає файли до вже існуючого релізу (інакше два паралельні
  # electron-builder --publish always дають 422: release tag_name already_exists).
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'win' || github.event.inputs.platform == 'all')) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # Ручний запуск: лише артефакти для завантаження з вкладки Actions
      - name: Build Windows installer (artifacts only)
        if: github.event_name == 'workflow_dispatch'
        run: npm run build:win

      # Пуш тега v*: публікація в GitHub Release (latest.yml + exe + blockmap)
      - name: Build Windows and publish release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx cross-env NODE_ENV=production electron-builder --win --publish always

      - name: Upload Windows artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist-electron/latest.yml
            dist-electron/*.exe
            dist-electron/*.exe.blockmap
          retention-days: 3

  build-macos:
    name: Build for macOS
    needs: [build-windows]
    runs-on: macos-latest
    if: |
      always() &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      (
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'mac' || github.event.inputs.platform == 'all')) ||
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      )
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build macOS (artifacts only)
        if: github.event_name == 'workflow_dispatch'
        env:
          # Без підпису на CI
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:mac

      - name: Build macOS and publish release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx cross-env NODE_ENV=production electron-builder --mac --publish always

      - name: Upload macOS artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            dist-electron/latest-mac.yml
            dist-electron/*.dmg
            dist-electron/*-mac.zip
          retention-days: 3

