version: 2.1

jobs:
  build-macos:
    macos:
      xcode: "15.0.0"
    steps:
      - checkout
      
      - run:
          name: Install Node.js
          command: |
            brew install node@18 || true
            export PATH="/opt/homebrew/opt/node@18/bin:$PATH" || export PATH="/usr/local/opt/node@18/bin:$PATH"
            node --version
            npm --version
      
      - restore_cache:
          keys:
            - deps-{{ checksum "package-lock.json" }}
      
      - run:
          name: Install dependencies
          command: |
            export PATH="/opt/homebrew/opt/node@18/bin:$PATH" || export PATH="/usr/local/opt/node@18/bin:$PATH"
            npm ci
      
      - save_cache:
          paths:
            - node_modules
          key: deps-{{ checksum "package-lock.json" }}
      
      - run:
          name: Build application
          command: |
            export PATH="/opt/homebrew/opt/node@18/bin:$PATH" || export PATH="/usr/local/opt/node@18/bin:$PATH"
            npm run build
            npm run build:mac
      
      - store_artifacts:
          path: dist-electron

workflows:
  build:
    jobs:
      - build-macos
