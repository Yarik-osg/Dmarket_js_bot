    <script>
        // Polyfill for global (needed for webpack dev server in Electron)
        if (typeof global === 'undefined') {
            var global = globalThis || window;
        }
        if (typeof window !== 'undefined' && typeof window.global === 'undefined') {
            window.global = global;
        }
    </script>
