appId: com.dmarket.bot
productName: DMarket Bot
directories:
  output: dist-electron
files:
  - main/**
  - renderer/dist/**
  - package.json
  - shared/**
extraMetadata:
  main: main/main.js
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
win:
  target:
    - target: nsis
      arch:
        - x64
  # icon: build/icon.ico  # Uncomment if you have an icon file
mac:
  # Use universal build - works on both Intel (x64) and Apple Silicon (arm64)
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.utilities
  minimumSystemVersion: "10.13"
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  entitlements: null
  entitlementsInherit: null
  # Force universal binary creation
  artifactName: "${productName}-${version}.${ext}"
  # icon: build/icon.icns  # Uncomment if you have an icon file
linux:
  target: AppImage
  # icon: build/icon.png  # Uncomment if you have an icon file

# Disable automatic publishing to GitHub
publish: null


