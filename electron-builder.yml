appId: com.dmarket.bot
productName: DMarket Bot
directories:
  output: dist-electron
files:
  - main/**
  - renderer/dist/**
  - package.json
  - shared/**
extraMetadata:
  main: main/main.js
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  include: build/installer.nsh
win:
  target:
    - target: nsis
      arch:
        - x64
  # icon: build/icon.ico  # Uncomment if you have an icon file
mac:
  # Build separate DMG files for each architecture
  # This ensures compatibility with both Intel and Apple Silicon Macs
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  minimumSystemVersion: "10.13"
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  entitlements: null
  entitlementsInherit: null
  # Ensure compatibility with older macOS versions
  extendInfo:
    LSMinimumSystemVersion: "10.13"
    NSHighResolutionCapable: true
  # icon: build/icon.icns  # Uncomment if you have an icon file
linux:
  target: AppImage
  # icon: build/icon.png  # Uncomment if you have an icon file

# Disable automatic publishing to GitHub
publish: null


